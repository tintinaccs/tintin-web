<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingresar — Tintin Accesorios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tintin.css" />
  <style>
    body {
      min-height: 100vh;
      background: #fce4ec;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: #fce4ec;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      border: 1.5px solid #f5d0de;
    }

    .login-logo {
      text-align: center;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--acc);
      margin-bottom: 8px;
    }

    .login-sub {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .login-tabs {
      display: flex;
      gap: 0;
      border: 2px solid var(--acc-light);
      border-radius: 50px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .login-tab {
      flex: 1;
      padding: 9px;
      border: none;
      background: transparent;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s;
      font-family: var(--font);
    }

    .login-tab.active {
      background: var(--acc);
      color: #fff;
    }

    .login-form { display: none; flex-direction: column; gap: 14px; }
    .login-form.active { display: flex; }

    .login-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .login-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
    }

    .login-input {
      padding: 12px 16px;
      border: 1.5px solid #eee;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: var(--font);
      color: var(--text);
      transition: border .2s;
    }

    .login-input:focus {
      outline: none;
      border-color: var(--acc);
    }

    .login-btn {
      padding: 14px;
      background: var(--acc);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .1em;
      cursor: pointer;
      font-family: var(--font);
      transition: background .2s;
      margin-top: 4px;
    }
    .login-btn:hover { background: var(--acc-dark); }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #eee;
    }

    .login-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px;
      border: 1.5px solid #eee;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      background: #fce4ec;
      font-family: var(--font);
      transition: all .2s;
    }
    .login-google:hover { border-color: var(--acc); background: var(--acc-pale); }

    .login-error {
      background: #ffebee;
      color: #c62828;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      display: none;
    }
    .login-error.show { display: block; }

    .login-back {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .login-back a { color: var(--acc); font-weight: 700; }

    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">Tintin ✨</div>
  <div class="login-sub">Tu cuenta</div>

  <!-- TABS -->
  <div class="login-tabs">
    <button class="login-tab active" data-tab="login">Ingresar</button>
    <button class="login-tab" data-tab="registro">Registrarse</button>
  </div>

  <!-- ERROR -->
  <div class="login-error" id="login-error"></div>

  <!-- FORM LOGIN -->
  <div class="login-form active" id="form-login">
    <div class="login-field">
      <label class="login-label">Email</label>
      <input type="email" class="login-input" id="login-email" placeholder="tu@email.com" />
    </div>
    <div class="login-field">
      <label class="login-label">Contraseña</label>
      <input type="password" class="login-input" id="login-pass" placeholder="••••••••" />
    </div>
    <button class="login-btn" id="btn-login-email">Ingresar</button>
    <div class="login-divider">o</div>
    <button class="login-google" id="btn-login-google">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google" />
      Continuar con Google
    </button>
  </div>

  <!-- FORM REGISTRO -->
  <div class="login-form" id="form-registro">
    <div class="login-field">
      <label class="login-label">Nombre completo</label>
      <input type="text" class="login-input" id="reg-nombre" placeholder="Tu nombre" />
    </div>
    <div class="login-field">
      <label class="login-label">Email</label>
      <input type="email" class="login-input" id="reg-email" placeholder="tu@email.com" />
    </div>
    <div class="login-field">
      <label class="login-label">Contraseña</label>
      <input type="password" class="login-input" id="reg-pass" placeholder="Mínimo 6 caracteres" />
    </div>
    <button class="login-btn" id="btn-registrar">Crear cuenta</button>
    <div class="login-divider">o</div>
    <button class="login-google" id="btn-reg-google">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google" />
      Registrarse con Google
    </button>
  </div>

  <div class="login-back">
    <a href="index.html">← Volver a la tienda</a>
  </div>
</div>

<script type="module">
import { auth, db, provider } from "./js/firebase.js";
import {
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signInWithPopup,
  updateProfile,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  doc, setDoc, getDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Si ya está logueado, redirigir
onAuthStateChanged(auth, user => {
  if (user) window.location.href = "perfil.html";
});

// TABS
document.querySelectorAll(".login-tab").forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll(".login-tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".login-form").forEach(f => f.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("form-" + tab.dataset.tab).classList.add("active");
    hideError();
  };
});

function showError(msg) {
  const el = document.getElementById("login-error");
  el.textContent = msg;
  el.classList.add("show");
}
function hideError() {
  document.getElementById("login-error").classList.remove("show");
}

function errMsg(code) {
  const msgs = {
    "auth/user-not-found":     "No existe una cuenta con ese email",
    "auth/wrong-password":     "Contraseña incorrecta",
    "auth/email-already-in-use": "Ya existe una cuenta con ese email",
    "auth/weak-password":      "La contraseña debe tener al menos 6 caracteres",
    "auth/invalid-email":      "Email inválido",
    "auth/too-many-requests":  "Demasiados intentos. Intentá más tarde.",
    "auth/popup-closed-by-user": "Cerraste el popup de Google",
  };
  return msgs[code] || "Error: " + code;
}

async function guardarUsuario(user, nombre) {
  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      name:      nombre || user.displayName || "",
      email:     user.email,
      photoURL:  user.photoURL || "",
      createdAt: serverTimestamp(),
    });
  }
}

// LOGIN EMAIL
document.getElementById("btn-login-email").onclick = async () => {
  hideError();
  const email = document.getElementById("login-email").value.trim();
  const pass  = document.getElementById("login-pass").value;
  if (!email || !pass) { showError("Completá email y contraseña"); return; }
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    await guardarUsuario(cred.user, "");
    window.location.href = "perfil.html";
  } catch(e) { showError(errMsg(e.code)); }
};

// REGISTRO EMAIL
document.getElementById("btn-registrar").onclick = async () => {
  hideError();
  const nombre = document.getElementById("reg-nombre").value.trim();
  const email  = document.getElementById("reg-email").value.trim();
  const pass   = document.getElementById("reg-pass").value;
  if (!nombre || !email || !pass) { showError("Completá todos los campos"); return; }
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: nombre });
    await guardarUsuario(cred.user, nombre);
    window.location.href = "perfil.html";
  } catch(e) { showError(errMsg(e.code)); }
};

// GOOGLE
const loginConGoogle = async () => {
  hideError();
  try {
    const cred = await signInWithPopup(auth, provider);
    await guardarUsuario(cred.user, cred.user.displayName);
    window.location.href = "perfil.html";
  } catch(e) { showError(errMsg(e.code)); }
};

document.getElementById("btn-login-google").onclick  = loginConGoogle;
document.getElementById("btn-reg-google").onclick    = loginConGoogle;

// Enter para submit
document.getElementById("login-pass").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("btn-login-email").click();
});
document.getElementById("reg-pass").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("btn-registrar").click();
});
</script>

</body>
</html>
