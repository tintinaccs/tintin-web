<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi perfil — Tintin Accesorios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tintin.css" />
  <style>
    body { background: var(--acc-pale); min-height: 100vh; }

    .perfil-wrap {
      max-width: 700px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .perfil-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--acc);
      margin-bottom: 24px;
    }

    .perfil-card {
      background: #fff;
      border-radius: var(--radius);
      border: 1.5px solid #f5d0de;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .perfil-header {
      background: linear-gradient(135deg, #fce4ec, #fff0f5);
      padding: 32px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .perfil-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--acc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
      overflow: hidden;
    }

    .perfil-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .perfil-name {
      font-size: 22px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--text);
    }

    .perfil-email {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      margin-top: 2px;
    }

    .perfil-body { padding: 24px; }

    .perfil-section-title {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--acc);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1.5px solid var(--acc-light);
    }

    .perfil-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 16px;
    }

    .perfil-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
    }

    .perfil-input {
      padding: 11px 16px;
      border: 1.5px solid #eee;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: var(--font);
      color: var(--text);
      transition: border .2s;
    }
    .perfil-input:focus { outline: none; border-color: var(--acc); }

    .perfil-btn {
      padding: 11px 28px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
      cursor: pointer;
      font-family: var(--font);
      border: none;
      transition: all .2s;
    }
    .perfil-btn-primary { background: var(--acc); color: #fff; }
    .perfil-btn-primary:hover { background: var(--acc-dark); }
    .perfil-btn-outline { background: transparent; border: 2px solid var(--acc); color: var(--acc); }
    .perfil-btn-outline:hover { background: var(--acc); color: #fff; }
    .perfil-btn-danger { background: transparent; border: 2px solid #ff4d4f; color: #ff4d4f; }
    .perfil-btn-danger:hover { background: #ff4d4f; color: #fff; }

    .perfil-wa-box {
      background: #e8f5e9;
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: var(--text);
      transition: background .2s;
      border: 1.5px solid #c8e6c9;
    }
    .perfil-wa-box:hover { background: #c8e6c9; }

    .perfil-wa-icon { font-size: 32px; }
    .perfil-wa-title { font-size: 14px; font-weight: 800; text-transform: uppercase; }
    .perfil-wa-desc  { font-size: 12px; color: #555; margin-top: 2px; }

    .perfil-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--acc);
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 700;
      display: none;
      z-index: 999;
      animation: fadeUp .3s ease;
    }
    .perfil-toast.show { display: block; }
  </style>
</head>
<body>

<div class="perfil-wrap">
  <a href="index.html" class="perfil-back">← Volver a la tienda</a>

  <!-- HEADER PERFIL -->
  <div class="perfil-card">
    <div class="perfil-header">
      <div class="perfil-avatar" id="perfil-avatar">?</div>
      <div>
        <div class="perfil-name" id="perfil-nombre-display">—</div>
        <div class="perfil-email" id="perfil-email-display">—</div>
      </div>
    </div>

    <div class="perfil-body">
      <div class="perfil-section-title">Mis datos</div>

      <div class="perfil-field">
        <label class="perfil-label">Nombre</label>
        <input type="text" class="perfil-input" id="perfil-nombre" placeholder="Tu nombre completo" />
      </div>
      <div class="perfil-field">
        <label class="perfil-label">Teléfono (opcional)</label>
        <input type="tel" class="perfil-input" id="perfil-tel" placeholder="Ej: 0981 123 456" />
      </div>
      <div class="perfil-field">
        <label class="perfil-label">Dirección de entrega (opcional)</label>
        <input type="text" class="perfil-input" id="perfil-dir" placeholder="Ej: Av. España 1234, Asunción" />
      </div>

      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">
        <button class="perfil-btn perfil-btn-primary" id="btn-guardar-perfil">💾 Guardar cambios</button>
        <button class="perfil-btn perfil-btn-danger" id="btn-logout">🚪 Cerrar sesión</button>
      </div>
    </div>
  </div>

  <!-- CONTACTO WA -->
  <div class="perfil-card">
    <div class="perfil-body">
      <div class="perfil-section-title">¿Necesitás ayuda?</div>
      <a href="https://wa.me/595981299331?text=Hola%21+Necesito+ayuda+con+mi+pedido+%F0%9F%8C%B8"
         target="_blank"
         class="perfil-wa-box">
        <div class="perfil-wa-icon">💬</div>
        <div>
          <div class="perfil-wa-title">Contactar por WhatsApp</div>
          <div class="perfil-wa-desc">Te respondemos en minutos — Lun a Sáb</div>
        </div>
      </a>
    </div>
  </div>

  <!-- LINKS RÁPIDOS -->
  <div class="perfil-card">
    <div class="perfil-body">
      <div class="perfil-section-title">Accesos rápidos</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <a href="catalogo.html" class="perfil-btn perfil-btn-outline">🛍️ Ver catálogo</a>
        <a href="index.html" class="perfil-btn perfil-btn-outline">🏠 Inicio</a>
        <a href="admin.html" class="perfil-btn perfil-btn-outline" id="link-admin-perfil" style="display:none">⚙️ Admin</a>
      </div>
    </div>
  </div>
</div>

<div class="perfil-toast" id="perfil-toast"></div>

<script type="module">
import { auth, db } from "./js/firebase.js";
import {
  signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  doc, getDoc, updateDoc, setDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const ADMIN_EMAIL = "tintinaccs@gmail.com";

function toast(msg) {
  const t = document.getElementById("perfil-toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = "login.html"; return; }

  // Header
  const avatarEl = document.getElementById("perfil-avatar");
  if (user.photoURL) {
    avatarEl.innerHTML = `<img src="${user.photoURL}" alt="foto" />`;
  } else {
    avatarEl.textContent = (user.displayName || user.email || "?")[0].toUpperCase();
  }

  document.getElementById("perfil-nombre-display").textContent = user.displayName || user.email;
  document.getElementById("perfil-email-display").textContent  = user.email;

  if (user.email === ADMIN_EMAIL) {
    document.getElementById("link-admin-perfil").style.display = "inline-flex";
  }

  // Cargar datos de Firestore
  const ref  = doc(db, "users", user.uid);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    const d = snap.data();
    document.getElementById("perfil-nombre").value = d.name  || user.displayName || "";
    document.getElementById("perfil-tel").value    = d.phone || "";
    document.getElementById("perfil-dir").value    = d.address || "";
  }

  // Guardar
  document.getElementById("btn-guardar-perfil").onclick = async () => {
    try {
      await setDoc(ref, {
        name:      document.getElementById("perfil-nombre").value.trim(),
        phone:     document.getElementById("perfil-tel").value.trim(),
        address:   document.getElementById("perfil-dir").value.trim(),
        email:     user.email,
        updatedAt: serverTimestamp(),
      }, { merge: true });
      toast("✅ Perfil actualizado");
    } catch(e) { toast("❌ Error al guardar"); }
  };

  // Logout
  document.getElementById("btn-logout").onclick = () =>
    signOut(auth).then(() => window.location.href = "index.html");
});
</script>

</body>
</html>
