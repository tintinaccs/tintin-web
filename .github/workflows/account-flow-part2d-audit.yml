name: Auditoría visual Parte 2D

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  account-flow:
    name: Checkout, Login y Perfil
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: npm install --no-save --package-lock=false --omit=dev playwright@1.54.1

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Audit account flow pages
        id: account_flow_audit
        continue-on-error: true
        run: node scripts/audit-account-flow-visual-part2d.mjs > account-flow-part2d-raw.log 2>&1

      - name: Enforce actionable account flow findings
        id: account_flow_enforce
        continue-on-error: true
        run: node scripts/enforce-account-flow-part2d.mjs > account-flow-part2d.log 2>&1

      - name: Upload report and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: account-flow-part2d-report
          path: |
            account-flow-part2d.log
            account-flow-part2d-raw.log
            artifacts/account-flow-part2d
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce account flow visual audit
        run: |
          cat account-flow-part2d.log
          test "${{ steps.account_flow_enforce.outcome }}" = "success"
