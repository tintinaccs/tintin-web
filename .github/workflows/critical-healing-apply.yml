name: Apply critical healing

on:
  push:
    branches:
      - security/critical-healing-pass
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout critical branch
        uses: actions/checkout@v4
        with:
          ref: security/critical-healing-pass
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refine verified patch targets
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          path = Path('scripts/apply-critical-healing-once.cjs')
          text = path.read_text()

          first = re.compile(
              r'(rules\s*=\s*)replaceExact\(\s*rules,\s*"        \'profileStatsUpdatedAt\', \'orderStats\'",'
          )
          def first_replacement(match):
              return (
                  match.group(1) + 'replaceFirstAfter(\n'
                  + '    rules,\n'
                  + "    'function protectedUserFieldsChanged()',\n"
                  + '    "        \'profileStatsUpdatedAt\', \'orderStats\'",'
              )
          text, count = first.subn(first_replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'No se encontró una única llamada de campos protegidos: {count}')

          second = re.compile(
              r"  rules = replaceFirstAfter\(\n"
              r"    rules,\n"
              r"    'match /orders/\{orderId\}',\n"
              r"    `[\s\S]*?"
              r"    'Exigir reconciliación al cambiar el estado del pedido'\n"
              r"  \);"
          )
          second_replacement = r'''  rules = replaceRegex(
            rules,
            /(currentRolePermAllows\('pedidos', 'cambiarEstado'\)\s+\)\s+&&)\s+(\()/,
            `$1\n              staffOrderInventoryTransitionValid(orderId) &&\n              $2`,
            'Exigir reconciliación al cambiar el estado del pedido'
          );'''
          text, count = second.subn(lambda _: second_replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'No se encontró una única llamada de transición de pedido: {count}')

          path.write_text(text)
          PY

      - name: Apply verified critical patch
        run: |
          set +e
          rm -f critical-patch.log
          {
            echo '=== CONTEXTO DEL EDITOR DE PEDIDO ==='
            grep -n -E "saveOrderEdit|openOrderEdit|orderEditBaseline|oe-save|updateDoc.*orders" js/admin-app.js || true
            echo '=== RESULTADO DEL PARCHE ==='
          } > critical-patch.log
          node scripts/apply-critical-healing-once.cjs >> critical-patch.log 2>&1
          code=$?
          cat critical-patch.log
          if [ "$code" -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add critical-patch.log
            git commit -m "Record critical patch diagnostic"
            git push origin HEAD:security/critical-healing-pass
            exit "$code"
          fi
          rm -f critical-patch.log

      - name: Validate generated changes
        run: |
          git diff --check
          node --check js/admin-app.js
          node --check js/secure-checkout-order.js
          node --check js/site-activity.js
          node --check js/firebase.js
          node scripts/test-inventory-model.mjs

      - name: Commit generated patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Fix critical inventory and quota integrity"
          git push origin HEAD:security/critical-healing-pass
