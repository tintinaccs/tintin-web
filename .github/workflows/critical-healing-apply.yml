name: Apply critical healing

on:
  push:
    branches:
      - security/critical-healing-pass
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout critical branch
        uses: actions/checkout@v4
        with:
          ref: security/critical-healing-pass
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refine verified patch target
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-critical-healing-once.cjs')
          text = path.read_text()
          before = '''  rules = replaceExact(
            rules,
            "        'profileStatsUpdatedAt', 'orderStats'",
            "        'profileStatsUpdatedAt', 'orderStats', 'lastCheckoutAt', 'lastCheckoutOrderId'",
            'Proteger campos del guard de checkout'
          );'''
          after = '''  rules = replaceFirstAfter(
            rules,
            'function protectedUserFieldsChanged()',
            "        'profileStatsUpdatedAt', 'orderStats'",
            "        'profileStatsUpdatedAt', 'orderStats', 'lastCheckoutAt', 'lastCheckoutOrderId'",
            'Proteger campos del guard de checkout'
          );'''
          if text.count(before) != 1:
              raise SystemExit(f'No se encontró exactamente el bloque a refinar: {text.count(before)}')
          path.write_text(text.replace(before, after))
          PY

      - name: Apply verified critical patch
        run: |
          set +e
          rm -f critical-patch.log
          node scripts/apply-critical-healing-once.cjs > critical-patch.log 2>&1
          code=$?
          cat critical-patch.log
          if [ "$code" -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add critical-patch.log
            git commit -m "Record critical patch diagnostic"
            git push origin HEAD:security/critical-healing-pass
            exit "$code"
          fi
          rm -f critical-patch.log

      - name: Validate generated changes
        run: |
          git diff --check
          node --check js/admin-app.js
          node --check js/secure-checkout-order.js
          node --check js/site-activity.js
          node --check js/firebase.js
          node scripts/test-inventory-model.mjs

      - name: Commit generated patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Fix critical inventory and quota integrity"
          git push origin HEAD:security/critical-healing-pass
