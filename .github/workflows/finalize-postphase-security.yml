name: Finalizar seguridad post-fases

on:
  push:
    branches:
      - fix/postphase-security-hardening
    paths:
      - '.github/workflows/finalize-postphase-security.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar rama
        uses: actions/checkout@v4
        with:
          ref: fix/postphase-security-hardening
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Actualizar auditorías y limpiar archivos temporales
        run: |
          python - <<'PY'
          from pathlib import Path

          email = Path('scripts/audit-email-phase3.js')
          text = email.read_text()
          old = """  bridge.includes(\"document.getElementById('ck-success-head')\") &&
              bridge.includes('sendOrderNotification(found.id, compatibilityOrder, false)') &&
              bridge.includes('notificationStatus: status'),
            'El correo debe iniciarse después de crear el pedido y registrar el resultado.'"""
          new = """  bridge.includes(\"document.getElementById('ck-success-head')\") &&
              bridge.includes('sendOrderNotification(found.id, compatibilityOrder, false)') &&
              bridge.includes(\"new CustomEvent('tintin:order-email-result'\") &&
              !bridge.includes(\"updateDoc(doc(db, 'orders'\") &&
              !bridge.includes('notificationStatus: status'),
            'Apps Script debe guardar el estado real; el navegador solo informa el resultado.'"""
          if old not in text:
              raise SystemExit('No se encontró el control antiguo del puente de correos')
          email.write_text(text.replace(old, new, 1))

          images = Path('scripts/audit-images-phase5.js')
          text = images.read_text()
          old = """  files.products.includes(\"import { sanitizeImageUrl } from './image-utils.js'\") &&
              files.products.includes('return sanitizeImageUrl(img);'),"""
          new = """  files.products.includes(\"from './image-utils.js'\") &&
              files.products.includes('sanitizeImageUrl') &&
              files.products.includes('return sanitizeImageUrl(img);'),"""
          if old not in text:
              raise SystemExit('No se encontró el control antiguo de imágenes')
          images.write_text(text.replace(old, new, 1))

          for name in [
              '.github/workflows/apply-postphase-security.yml',
              '.github/workflows/apply-postphase-security-artifact.yml',
              '.github/workflows/finalize-postphase-security.yml',
              'scripts/apply-postphase-security-hardening.js',
          ]:
              path = Path(name)
              if path.exists():
                  path.unlink()
          PY

      - name: Revisar todas las auditorías
        run: npm run audit:final

      - name: Guardar resultado en la rama
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          tree=$(git write-tree)
          parent=$(git rev-parse HEAD)
          commit=$(printf '%s\n' 'Seguridad post-fases: cerrar auditorías y limpiar temporales' | git commit-tree "$tree" -p "$parent")
          git push origin "$commit":refs/heads/fix/postphase-security-hardening
