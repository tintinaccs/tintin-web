name: Revisión final Fase 9

on:
  pull_request:
    branches:
      - main
    paths:
      - 'js/admin-import-phase9.js'
      - 'js/ui-quality.js'
      - 'scripts/audit-store-gate.js'
      - 'scripts/audit-final-release.js'
      - 'package.json'
      - '.firebaserc'
      - 'firebase.json'
      - 'firestore.rules'
      - 'docs/PHASE9_FINAL_RELEASE.md'
      - '.github/workflows/final-release-phase9.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  final-release:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          ref: security/critical-healing-pass
          fetch-depth: 0
      - name: Actualizar auditoría de lecturas limitadas
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/audit-store-gate.js')
          text = path.read_text()
          replacements = [
            (
              """  /match\\s+\\/products\\/\\{productId\\}\\s*\\{[\\s\\S]*?allow read:\\s*if isStoreOpenOrAllowed\\(\\);/.test(rules),
              'productos no deben leerse con la tienda cerrada'""",
              """  /match\\s+\\/products\\/\\{productId\\}\\s*\\{[\\s\\S]*?allow get:\\s*if isStoreOpenOrAllowed\\(\\);[\\s\\S]*?request\\.query\\.limit <= 1000/.test(rules),
              'productos deben exigir tienda abierta y limitar los listados públicos'"""
            ),
            (
              """  /match\\s+\\/collections\\/\\{collectionId\\}\\s*\\{[\\s\\S]*?allow read:\\s*if isStoreOpenOrAllowed\\(\\);/.test(rules),
              'colecciones no deben leerse con la tienda cerrada'""",
              """  /match\\s+\\/collections\\/\\{collectionId\\}\\s*\\{[\\s\\S]*?allow get:\\s*if isStoreOpenOrAllowed\\(\\);[\\s\\S]*?request\\.query\\.limit <= 200/.test(rules),
              'colecciones deben exigir tienda abierta y limitar los listados públicos'"""
            ),
            (
              """  /match\\s+\\/site_content\\/\\{pageId\\}\\s*\\{[\\s\\S]*?allow read:\\s*if isStoreOpenOrAllowed\\(\\);/.test(rules),
              'contenido administrable no debe leerse con la tienda cerrada'""",
              """  /match\\s+\\/site_content\\/\\{pageId\\}\\s*\\{[\\s\\S]*?allow get:\\s*if isStoreOpenOrAllowed\\(\\);[\\s\\S]*?allow list:\\s*if isSuperAdmin\\(\\);/.test(rules),
              'contenido público debe exigir tienda abierta y su listado quedar reservado'"""
            )
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'Contrato antiguo no encontrado exactamente: {text.count(old)}')
              text = text.replace(old, new)
          path.write_text(text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/audit-store-gate.js
          if ! git diff --cached --quiet; then
            git commit -m "Audit limited Firestore reads in store gate"
            git push origin HEAD:security/critical-healing-pass
          fi
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Configurar Java para Firestore
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Instalar herramientas
        run: npm install
      - name: Revisar sintaxis de Fase 9
        run: |
          node --check js/admin-import-phase9.js
          node --check js/ui-quality.js
          node --check scripts/audit-store-gate.js
          node --check scripts/audit-final-release.js
      - name: Auditar base del sitio
        run: npm run audit:tintin
      - name: Auditar cierre global
        run: npm run audit:store-gate
      - name: Auditar pedidos
        run: npm run audit:secure-orders
      - name: Auditar correos
        run: npm run audit:emails
      - name: Auditar colecciones
        run: npm run audit:collections
      - name: Auditar imágenes
        run: npm run audit:images
      - name: Auditar contenido
        run: npm run audit:content
      - name: Auditar carrito
        run: npm run audit:cart
      - name: Auditar usuarios y permisos
        run: npm run audit:security
      - name: Auditar cierre de despliegue
        run: npm run audit:release
      - name: Compilar reglas de Firestore
        run: npx firebase emulators:exec --only firestore --project demo-tintin "echo Reglas compiladas"
