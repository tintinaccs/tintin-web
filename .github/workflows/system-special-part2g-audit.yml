name: Auditoría visual Parte 2G

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  system-special-states:
    name: Sistema y estados especiales
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: npm install --no-save --package-lock=false --omit=dev playwright@1.54.1

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Measure system and special states
        id: system_special_measure
        continue-on-error: true
        run: node scripts/audit-system-special-states-part2g-v2.mjs > system-special-part2g-raw.log 2>&1

      - name: Enforce actionable special state findings
        run: node scripts/enforce-system-special-part2g.mjs > system-special-part2g.log 2>&1

      - name: Upload report and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-special-part2g-report
          path: |
            system-special-part2g.log
            system-special-part2g-raw.log
            artifacts/system-special-part2g
          if-no-files-found: warn
          retention-days: 7
