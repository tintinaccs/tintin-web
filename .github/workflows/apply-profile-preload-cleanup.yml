name: Apply profile preload cleanup

on:
  push:
    branches:
      - fix/profile-permissions-font-preloads

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/profile-permissions-font-preloads
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node <<'NODE'
          const fs = require('fs');
          const htmlPath = 'perfil.html';
          const workflowPath = '.github/workflows/apply-profile-preload-cleanup.yml';
          let html = fs.readFileSync(htmlPath, 'utf8');
          html = html.replace(/^\s*<link rel="preload" href="assets-tintin\/fonts\/montserrat-latin-wght-normal\.woff2" as="font" type="font\/woff2" crossorigin>\r?\n/m, '');
          html = html.replace(/^\s*<link rel="preload" href="assets-tintin\/fonts\/montserrat-latin-wght-italic\.woff2" as="font" type="font\/woff2" crossorigin>\r?\n/m, '');
          fs.writeFileSync(htmlPath, html);
          fs.unlinkSync(workflowPath);
          NODE
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add perfil.html .github/workflows/apply-profile-preload-cleanup.yml
          git commit -m "Elimina preloads innecesarios del perfil"
          git push origin HEAD:fix/profile-permissions-font-preloads
