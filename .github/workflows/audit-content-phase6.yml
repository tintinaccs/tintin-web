name: Auditoría de contenido Fase 6

on:
  pull_request:
    paths:
      - 'js/content-schema.js'
      - 'js/site-content.js'
      - 'js/admin-content-phase6.js'
      - 'js/edit-badge.js'
      - 'js/role-permissions.js'
      - 'js/ui-quality.js'
      - 'scripts/audit-content-phase6.js'
      - 'package.json'
      - '.github/workflows/audit-content-phase6.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Revisar sintaxis
        run: |
          node --check js/content-schema.js
          node --check js/site-content.js
          node --check js/admin-content-phase6.js
          node --check js/edit-badge.js
          node --check js/role-permissions.js
          node --check js/ui-quality.js
          node --check scripts/audit-content-phase6.js
      - name: Revisar integración
        run: npm run audit:content
