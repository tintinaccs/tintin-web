name: Validate two-phase checkout

on:
  push:
    branches:
      - security/critical-healing-pass
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  two-phase:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout critical branch
        uses: actions/checkout@v4
        with:
          ref: security/critical-healing-pass
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java for Firestore emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Apply two-phase checkout implementation
        id: patch
        continue-on-error: true
        run: |
          sed -i "s/pattern.subn(replacement, source, count=1)/pattern.subn(lambda _: replacement, source, count=1)/" scripts/refactor-checkout-guard-once.py
          python scripts/refactor-checkout-guard-once.py > two-phase-patch.log 2>&1
          python scripts/simplify-critical-rules-once.py >> two-phase-patch.log 2>&1

      - name: Upload patch report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: two-phase-patch-report
          path: two-phase-patch.log
          retention-days: 3

      - name: Show and enforce patch result
        run: |
          cat two-phase-patch.log
          test "${{ steps.patch.outcome }}" = "success"

      - name: Save generated implementation on draft branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/secure-checkout-order.js firestore.rules
          if ! git diff --cached --quiet; then
            git commit -m "Implement two-phase checkout inventory reservation"
            git push origin HEAD:security/critical-healing-pass
          fi

      - name: Install test dependencies
        run: npm install --no-audit --no-fund

      - name: Verify syntax and static contracts
        run: |
          node --check js/secure-checkout-order.js
          node --check scripts/test-firestore-critical.mjs
          node scripts/audit-critical-healing.js
          node scripts/audit-secure-orders.js

      - name: Verify adversarial rules in emulator
        id: adversarial
        continue-on-error: true
        run: npm run test:rules-critical > two-phase-emulator.log 2>&1

      - name: Upload emulator report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: two-phase-emulator-report
          path: two-phase-emulator.log
          retention-days: 3

      - name: Show and enforce emulator result
        run: |
          cat two-phase-emulator.log
          test "${{ steps.adversarial.outcome }}" = "success"
