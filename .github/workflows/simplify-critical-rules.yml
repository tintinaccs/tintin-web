name: Simplify critical rules safely

on:
  push:
    branches:
      - security/critical-healing-pass
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  simplify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout critical branch
        uses: actions/checkout@v4
        with:
          ref: security/critical-healing-pass
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply diagnosed simplification
        id: patch
        continue-on-error: true
        run: |
          python scripts/simplify-critical-rules-once.py > simplify-critical-patch.log 2>&1
          sed -i "s/item.price == product.price/product.price == item.price/" firestore.rules

      - name: Upload patch diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simplify-critical-patch-report
          path: simplify-critical-patch.log
          retention-days: 3

      - name: Show and enforce patch result
        run: |
          cat simplify-critical-patch.log
          test "${{ steps.patch.outcome }}" = "success"

      - name: Install emulator test dependencies
        run: npm install --no-save --package-lock=false @firebase/rules-unit-testing@3.0.3 firebase@10.12.0 firebase-tools@13.15.0

      - name: Verify static critical contracts
        run: |
          node scripts/audit-critical-healing.js
          node scripts/audit-secure-orders.js

      - name: Verify adversarial rules in emulator
        id: adversarial
        continue-on-error: true
        run: npm run test:rules-critical > simplify-critical-emulator.log 2>&1

      - name: Upload emulator report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simplify-critical-emulator-report
          path: simplify-critical-emulator.log
          retention-days: 3

      - name: Show and enforce emulator result
        run: |
          cat simplify-critical-emulator.log
          test "${{ steps.adversarial.outcome }}" = "success"

      - name: Commit validated simplification
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add firestore.rules scripts/audit-critical-healing.js scripts/audit-secure-orders.js
          git diff --cached --quiet && exit 0
          git commit -m "Reduce duplicate Firestore rule evaluation"
          git push origin HEAD:security/critical-healing-pass
