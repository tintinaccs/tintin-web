name: Balance checkout stock rules

on:
  push:
    branches:
      - security/critical-healing-pass
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  balance:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout critical branch
        uses: actions/checkout@v4
        with:
          ref: security/critical-healing-pass
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java for Firestore emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Apply balanced stock validation
        run: python scripts/rebalance-stock-validation-once.py

      - name: Save generated validation on draft branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add firestore.rules scripts/audit-critical-healing.js scripts/audit-secure-orders.js
          if ! git diff --cached --quiet; then
            git commit -m "Balance order and product stock validation"
            git push origin HEAD:security/critical-healing-pass
          fi

      - name: Install test dependencies
        run: npm install --no-audit --no-fund

      - name: Verify static contracts
        run: |
          node scripts/audit-critical-healing.js
          node scripts/audit-secure-orders.js

      - name: Verify adversarial rules in emulator
        id: adversarial
        continue-on-error: true
        run: npm run test:rules-critical > balanced-stock-emulator.log 2>&1

      - name: Upload emulator report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: balanced-stock-emulator-report
          path: balanced-stock-emulator.log
          retention-days: 3

      - name: Show and enforce emulator result
        run: |
          cat balanced-stock-emulator.log
          test "${{ steps.adversarial.outcome }}" = "success"
