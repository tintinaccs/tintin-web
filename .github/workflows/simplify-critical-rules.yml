name: Refactor checkout guard safely

on:
  push:
    branches:
      - security/critical-healing-pass
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  refactor:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout critical branch
        uses: actions/checkout@v4
        with:
          ref: security/critical-healing-pass
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java for Firestore emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Apply checkout guard and stock rule refactor
        id: patch
        continue-on-error: true
        run: |
          python scripts/refactor-checkout-guard-once.py > checkout-guard-patch.log 2>&1
          python scripts/reduce-stock-rule-once.py >> checkout-guard-patch.log 2>&1

      - name: Upload patch diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkout-guard-patch-report
          path: checkout-guard-patch.log
          retention-days: 3

      - name: Show and enforce patch result
        run: |
          cat checkout-guard-patch.log
          test "${{ steps.patch.outcome }}" = "success"

      - name: Save generated refactor on draft branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add firestore.rules js/secure-checkout-order.js scripts/test-firestore-critical.mjs scripts/audit-critical-healing.js scripts/audit-secure-orders.js
          if ! git diff --cached --quiet; then
            git commit -m "Stage checkout integrity refactor for emulator review"
            git push origin HEAD:security/critical-healing-pass
          fi

      - name: Install test dependencies
        run: npm install --no-audit --no-fund

      - name: Verify JavaScript and static contracts
        run: |
          node --check js/secure-checkout-order.js
          node --check scripts/test-firestore-critical.mjs
          node scripts/audit-critical-healing.js
          node scripts/audit-secure-orders.js

      - name: Verify adversarial rules in emulator
        id: adversarial
        continue-on-error: true
        run: npm run test:rules-critical > checkout-guard-emulator.log 2>&1

      - name: Upload emulator report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkout-guard-emulator-report
          path: checkout-guard-emulator.log
          retention-days: 3

      - name: Show and enforce emulator result
        run: |
          cat checkout-guard-emulator.log
          test "${{ steps.adversarial.outcome }}" = "success"
