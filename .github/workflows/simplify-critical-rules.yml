name: Simplify critical rules safely

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  simplify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout critical branch
        uses: actions/checkout@v4
        with:
          ref: security/critical-healing-pass
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Remove only duplicated rule work
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def sub_one(text, pattern, replacement, label):
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'{label}: se esperaba 1 coincidencia y se encontraron {count}')
              return updated

          rules_path = Path('firestore.rules')
          rules = rules_path.read_text()
          already = (
              "request.resource.data.stock < resource.data.stock" in rules and
              "allow update: if checkoutGuardOnlyUpdate(userId) ||" in rules and
              "(isSuperAdmin() || settings.get('storeOpen', false) == true)" in rules
          )

          if not already:
              rules = sub_one(
                  rules,
                  r"\(\s*isSuperAdmin\(\) \|\|\s*\(\s*settings\.get\('storeOpen', false\) == true &&\s*\(userData == null \|\| userData\.get\('blocked', false\) != true\)\s*\)\s*\) &&\s*\(\s*isSuperAdmin\(\) \|\|\s*\(\s*userData != null &&",
                  "(isSuperAdmin() || settings.get('storeOpen', false) == true) &&\n        (\n          isSuperAdmin() ||\n          (\n            userData != null &&",
                  'Simplificar tienda/cuenta redundante'
              )
              rules = sub_one(
                  rules,
                  r"resource\.data\.stock is number &&\s*request\.resource\.data\.stock is number &&\s*request\.resource\.data\.stock == resource\.data\.stock - orderedQty &&\s*request\.resource\.data\.stock >= 0 &&",
                  "resource.data.stock is number &&\n        request.resource.data.stock is number &&\n        request.resource.data.stock < resource.data.stock &&\n        request.resource.data.stock >= 0 &&",
                  'Eliminar aritmética duplicada del lado producto'
              )
              rules = sub_one(
                  rules,
                  r"allow update: if isSuperAdmin\(\) \|\|\s*sparkStockUpdateValid\(productId\) \|\|\s*adminInventoryStockUpdateValid\(productId\) \|\|",
                  "allow update: if sparkStockUpdateValid(productId) ||\n        adminInventoryStockUpdateValid(productId) ||\n        isSuperAdmin() ||",
                  'Priorizar caminos acotados de inventario'
              )

              users_start = rules.index('    match /users/{userId} {')
              update_start = rules.index('      allow update: if isSignedIn() && (', users_start)
              delete_start = rules.index('\n\n      allow delete:', update_start)
              update_block = rules[update_start:delete_start]
              update_block = update_block.replace(
                  '      allow update: if isSignedIn() && (',
                  '      allow update: if checkoutGuardOnlyUpdate(userId) ||\n        (\n          isSignedIn() && ('
              )
              nested_guard = '            loginMetadataOnlyUpdate() ||\n            checkoutGuardOnlyUpdate(userId)'
              if update_block.count(nested_guard) != 1:
                  raise SystemExit('No se encontró una única rama anidada del guard de checkout')
              update_block = update_block.replace(nested_guard, '            loginMetadataOnlyUpdate()')
              if not update_block.endswith('      );'):
                  raise SystemExit('El bloque de actualización de usuario no termina como se esperaba')
              update_block = update_block[:-len('      );')] + '          )\n        );'
              rules = rules[:update_start] + update_block + rules[delete_start:]

              decorative_checks = [
                  r"\s*item\.cat is string && item\.cat\.size\(\) <= 120 &&",
                  r"\s*item\.variant is string && item\.variant\.size\(\) <= 120 &&",
                  r"\s*item\.imageUrl is string && item\.imageUrl\.size\(\) <= 900 &&",
                  r"\s*item\.name == product\.get\('name', product\.get\('title', product\.get\('Title', 'Producto'\)\)\) &&"
              ]
              for index, pattern in enumerate(decorative_checks, start=1):
                  rules = sub_one(rules, pattern, '', f'Quitar chequeo decorativo redundante {index}')

              rules_path.write_text(rules)

          critical_path = Path('scripts/audit-critical-healing.js')
          critical = critical_path.read_text()
          if "request.resource.data.stock == resource.data.stock - orderedQty" in critical:
              critical = sub_one(
                  critical,
                  r"rules\.includes\('sparkOrderQtyForProduct\(orderData, productId\)'\) &&\s*rules\.includes\('request\.resource\.data\.stock == resource\.data\.stock - orderedQty'\),\s*'sparkStockUpdateValid debe leer el pedido creado y exigir la cantidad exacta\.'",
                  "rules.includes('sparkOrderQtyForProduct(orderData, productId)') &&\n    rules.includes('orderedQty > 0') &&\n    rules.includes('request.resource.data.stock < resource.data.stock'),\n  'La regla del producto debe rechazar productos ajenos; sparkItemValid conserva la cantidad exacta.'",
                  'Actualizar auditoría crítica'
              )
              critical_path.write_text(critical)

          secure_path = Path('scripts/audit-secure-orders.js')
          secure = secure_path.read_text()
          if "request.resource.data.stock == resource.data.stock - orderedQty" in secure:
              secure = sub_one(
                  secure,
                  r"rules\.includes\('productAfter\.stock == product\.stock - item\.qty'\) &&\s*rules\.includes\('sparkOrderQtyForProduct\(orderData, productId\)'\) &&\s*rules\.includes\('request\.resource\.data\.stock == resource\.data\.stock - orderedQty'\),\s*'Un pedido debe descontar exactamente su cantidad y no puede tocar productos ajenos\.'",
                  "rules.includes('productAfter.stock == product.stock - item.qty') &&\n    rules.includes('sparkOrderQtyForProduct(orderData, productId)') &&\n    rules.includes('orderedQty > 0') &&\n    rules.includes('request.resource.data.stock < resource.data.stock'),\n  'El pedido obliga la cantidad exacta y la regla del producto rechaza cualquier producto ajeno.'",
                  'Actualizar auditoría de pedidos'
              )
              secure_path.write_text(secure)
          PY

      - name: Install emulator test dependencies
        run: npm install --no-save --package-lock=false @firebase/rules-unit-testing@3.0.3 firebase@10.12.0 firebase-tools@13.15.0

      - name: Verify static critical contracts
        run: |
          node scripts/audit-critical-healing.js
          node scripts/audit-secure-orders.js

      - name: Verify adversarial rules in emulator
        id: adversarial
        continue-on-error: true
        run: npm run test:rules-critical > simplify-critical-emulator.log 2>&1

      - name: Upload simplification emulator report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simplify-critical-emulator-report
          path: simplify-critical-emulator.log
          retention-days: 3

      - name: Enforce adversarial result
        run: |
          cat simplify-critical-emulator.log
          test "${{ steps.adversarial.outcome }}" = "success"

      - name: Commit validated simplification
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add firestore.rules scripts/audit-critical-healing.js scripts/audit-secure-orders.js
          git diff --cached --quiet && exit 0
          git commit -m "Reduce duplicate Firestore rule evaluation"
          git push origin HEAD:security/critical-healing-pass
