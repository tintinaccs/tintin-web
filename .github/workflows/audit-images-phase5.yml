name: Auditoría de imágenes Fase 5

on:
  pull_request:
    paths:
      - 'admin-images.html'
      - 'js/firebase.js'
      - 'js/image-utils.js'
      - 'js/images.js'
      - 'js/image-resolver.js'
      - 'js/images-phase5.js'
      - 'js/admin-images-phase5.js'
      - 'js/image-processing.js'
      - 'js/image-upload-widget.js'
      - 'js/media-library.js'
      - 'js/admin-media-library-ui.js'
      - 'js/diagnostic-shims/storage-shim.js'
      - 'js/products-store.js'
      - 'js/site-activity.js'
      - 'js/ui-quality.js'
      - 'cloudflare/cloudinary-security.js'
      - 'functions/api/cloudinary-sign-upload.js'
      - 'functions/api/cloudinary-delete.js'
      - 'functions/api/visitor-geo.js'
      - '_routes.json'
      - 'assets-tintin/images/README-IMAGENES.md'
      - 'CLOUDINARY_SETUP.md'
      - 'firebase.json'
      - 'storage.rules'
      - 'scripts/audit-images-phase5.js'
      - 'scripts/audit-site-reliability.js'
      - 'package.json'
      - '.github/workflows/audit-images-phase5.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          ref: security/critical-healing-pass
          fetch-depth: 0
      - name: Actualizar contrato de caché del header
        run: |
          sed -i 's/tintin-20260720-header-dropdown-white-1/tintin-20260721-header-surfaces-complete-1/' scripts/audit-site-reliability.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/audit-site-reliability.js
          if ! git diff --cached --quiet; then
            git commit -m "Update header surface cache audit contract"
            git push origin HEAD:security/critical-healing-pass
          fi
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Revisar sintaxis
        run: |
          node --check js/firebase.js
          node --check js/image-utils.js
          node --check js/images.js
          node --check js/image-resolver.js
          node --check js/images-phase5.js
          node --check js/admin-images-phase5.js
          node --check js/image-processing.js
          node --check js/image-upload-widget.js
          node --check js/media-library.js
          node --check js/admin-media-library-ui.js
          node --check js/diagnostic-shims/storage-shim.js
          node --check js/products-store.js
          node --check js/site-activity.js
          node --check js/ui-quality.js
          node --check cloudflare/cloudinary-security.js
          node --check functions/api/cloudinary-sign-upload.js
          node --check functions/api/cloudinary-delete.js
          node --check functions/api/visitor-geo.js
          node --check scripts/audit-images-phase5.js
          node --check scripts/audit-site-reliability.js
      - name: Compilar Pages Functions
        shell: bash
        run: |
          set -o pipefail
          npx --yes wrangler@latest pages functions build functions --outdir=.cloudflare-functions --project-directory=. 2>&1 | tee wrangler-build.log
      - name: Guardar registro de Wrangler
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-build-log
          path: wrangler-build.log
          if-no-files-found: warn
          retention-days: 1
      - name: Revisar integración
        run: npm run audit:images
      - name: Revisar confiabilidad
        id: reliability
        continue-on-error: true
        run: npm run audit:reliability > image-reliability-audit.log 2>&1
      - name: Guardar informe de confiabilidad
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: image-reliability-audit-log
          path: image-reliability-audit.log
          retention-days: 7
      - name: Exigir resultado de confiabilidad
        run: |
          cat image-reliability-audit.log
          test "${{ steps.reliability.outcome }}" = "success"
