name: Aplicar endurecimiento post-fases

on:
  push:
    branches:
      - fix/postphase-security-hardening
    paths:
      - 'scripts/apply-postphase-security-hardening.js'
      - '.github/workflows/apply-postphase-security.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar rama
        uses: actions/checkout@v4
        with:
          ref: fix/postphase-security-hardening
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Corregir generador temporal
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-postphase-security-hardening.js')
          text = path.read_text()
          text = text.replace("replace(/['\\\"<>\\\\\\\\`]/g, '')", "replace(/[\\x22\\x27<>\\\\\\\\]/g, '')")
          text = text.replace(
              "check('Checkout ya no actualiza estado desde cliente', !bridge.includes('await updateDoc(doc(db, \\\'orders\\\''));",
              "check('Checkout ya no actualiza estado desde cliente', !bridge.includes(\"await updateDoc(doc(db, 'orders'\"));"
          )
          old_once = """function replaceOnce(content, search, replacement, label) {
  if (content.includes(replacement)) return content;
  const index = content.indexOf(search);
  if (index < 0) throw new Error(`No se encontró el bloque: ${label}`);
  return content.slice(0, index) + replacement + content.slice(index + search.length);
}"""
          new_once = """function replaceOnce(content, search, replacement, label) {
  const index = content.indexOf(search);
  if (index < 0) {
    if (content.includes(replacement)) return content;
    throw new Error(`No se encontró el bloque: ${label}`);
  }
  return content.slice(0, index) + replacement + content.slice(index + search.length);
}"""
          old_regex = """function replaceRegex(content, regex, replacement, label) {
  if (typeof replacement === 'string' && content.includes(replacement)) return content;
  if (!regex.test(content)) throw new Error(`No se encontró el patrón: ${label}`);
  regex.lastIndex = 0;
  return content.replace(regex, replacement);
}"""
          new_regex = """function replaceRegex(content, regex, replacement, label) {
  if (!regex.test(content)) {
    if (typeof replacement === 'string' && content.includes(replacement)) return content;
    throw new Error(`No se encontró el patrón: ${label}`);
  }
  regex.lastIndex = 0;
  return content.replace(regex, replacement);
}"""
          if old_once not in text or old_regex not in text:
              raise SystemExit('No se encontraron los helpers del generador')
          text = text.replace(old_once, new_once, 1).replace(old_regex, new_regex, 1)
          path.write_text(text)
          PY
          node --check scripts/apply-postphase-security-hardening.js

      - name: Aplicar parche
        shell: bash
        run: |
          set +e
          node scripts/apply-postphase-security-hardening.js > hardening.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "El parche falló. Últimas líneas:"
            tail -n 80 hardening.log
            exit "$status"
          fi
          python - <<'PY'
          from pathlib import Path
          path = Path('firestore.rules')
          text = path.read_text()
          old = """            ) ||
            (
              isOwnOrderByUidOrEmail() &&
              request.resource.data.diff(resource.data)
                .affectedKeys().hasOnly(['notificationStatus', 'updatedAt'])
            )
          )"""
          if old in text:
              text = text.replace(old, """            )
          )""", 1)
          if "hasOnly(['notificationStatus', 'updatedAt'])" in text:
              raise SystemExit('La escritura de notificationStatus del cliente sigue presente')
          path.write_text(text)
          PY
          cat hardening.log

      - name: Guardar registro del parche
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardening-log-${{ github.run_id }}
          path: hardening.log
          if-no-files-found: warn

      - name: Revisar sintaxis
        shell: bash
        run: |
          set +e
          {
            node --check js/security-utils.js
            node --check js/products-store.js
            node --check js/cart-sync.js
            node --check js/roles.js
            node --check js/email-notify.js
            node --check js/checkout-email-bridge.js
            node --check script.js
            node --check scripts/audit-postphase-security.js
          } > syntax.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            cat syntax.log
            exit "$status"
          fi
          cat syntax.log

      - name: Guardar registro de sintaxis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: syntax-log-${{ github.run_id }}
          path: syntax.log
          if-no-files-found: warn

      - name: Guardar archivos generados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-security-files-${{ github.run_id }}
          path: |
            js/security-utils.js
            js/products-store.js
            js/cart-sync.js
            js/roles.js
            js/email-config.js
            js/email-notify.js
            js/checkout-email-bridge.js
            script.js
            checkout.html
            perfil.html
            firestore.rules
            apps-script/Phase3Security.gs
            functions/EMAIL_PHASE3_DEPLOY.md
            scripts/audit-postphase-security.js
            package.json
          if-no-files-found: warn

      - name: Ejecutar auditoría post-fases
        run: node scripts/audit-postphase-security.js

      - name: Guardar cambios generados
        run: |
          if git diff --quiet; then
            echo "No hay cambios nuevos para guardar."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/security-utils.js js/products-store.js js/cart-sync.js js/roles.js js/email-config.js js/email-notify.js js/checkout-email-bridge.js script.js checkout.html perfil.html firestore.rules apps-script/Phase3Security.gs functions/EMAIL_PHASE3_DEPLOY.md scripts/audit-postphase-security.js package.json
          git commit -m "Seguridad post-fases: datos, roles, perfiles y correos"
          git push origin HEAD:fix/postphase-security-hardening
