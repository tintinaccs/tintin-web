name: Tintin Audit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  audit:
    name: Repository audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Tintin audit
        run: npm run audit:tintin

      - name: Verify solid loader background
        run: node scripts/audit-loader-solid.js

      - name: Audit home page on all viewports
        run: node scripts/audit-home-page.js

      - name: Audit catalog page on all viewports
        run: node scripts/audit-catalog-page.js

      - name: Audit collections page on all viewports
        run: node scripts/audit-collections-page.js

      - name: Audit product page on all viewports
        run: node scripts/audit-product-page.js

      - name: Audit checkout page on all viewports
        run: node scripts/audit-checkout-page.js

      - name: Audit login page on all viewports
        run: node scripts/audit-login-page.js

      - name: Audit profile and orders on all viewports
        run: node scripts/audit-profile-orders-page.js

      - name: Audit about page on all viewports
        run: node scripts/audit-about-page.js

      - name: Audit contact page on all viewports
        run: node scripts/audit-contact-page.js

      - name: Audit terms and privacy pages on all viewports
        run: node scripts/audit-legal-pages.js

      - name: Audit Super Admin configuration to public site sync
        run: node scripts/audit-admin-public-sync.js

      - name: Audit Super Admin foundation (auth, nav, a11y, modals)
        run: node scripts/audit-admin-foundation.js

      - name: Audit products, collections and images (admin + storefront)
        run: node scripts/audit-admin-products-media.js

      - name: Audit orders lifecycle (admin edit, status, integrity)
        run: node scripts/audit-admin-orders.js

      - name: Audit users, roles and permissions (Super Admin protections)
        run: node scripts/audit-admin-users-roles.js

      - name: Audit content and appearance (editor safety, color apply)
        run: node scripts/audit-admin-content-appearance.js

      - name: Audit emails and messaging (single Resend channel, no frontend secrets, WhatsApp)
        run: node scripts/audit-admin-email-messaging.js

      - name: Audit statistics, audit log and diagnostics (no false zeros, privacy, immutable audit)
        run: node scripts/audit-admin-analytics-audit.js

      - name: Audit help pages (envíos, cambios/devoluciones, preguntas frecuentes)
        run: node scripts/audit-help-pages.js
