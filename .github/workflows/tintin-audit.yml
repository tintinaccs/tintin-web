name: Tintin Audit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  audit:
    name: Repository audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Tintin audit
        run: npm run audit:tintin

      - name: Verify solid loader background
        run: node scripts/audit-loader-solid.js

      - name: Audit home page on all viewports
        run: node scripts/audit-home-page.js

      - name: Audit catalog page on all viewports
        run: node scripts/audit-catalog-page.js

      - name: Audit collections page on all viewports
        run: node scripts/audit-collections-page.js

      - name: Audit product page on all viewports
        run: node scripts/audit-product-page.js

      - name: Audit checkout page on all viewports
        run: node scripts/audit-checkout-page.js

      - name: Audit login page on all viewports
        run: node scripts/audit-login-page.js

      - name: Audit profile and orders on all viewports
        run: node scripts/audit-profile-orders-page.js
