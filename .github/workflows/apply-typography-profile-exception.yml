name: Apply typography profile exception

on:
  push:
    branches:
      - fix/profile-permissions-font-preloads

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/profile-permissions-font-preloads
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          node <<'NODE'
          const fs = require('fs');
          const auditPath = 'scripts/audit-typography.js';
          const workflowPath = '.github/workflows/apply-typography-profile-exception.yml';
          let source = fs.readFileSync(auditPath, 'utf8');
          const oldBlock = "  check(stylesheetCount === 1, `${page}: debe cargar exactamente una vez css/montserrat.css con la versión ${VERSION}.`);\n  check(normalPreloadCount === 1, `${page}: falta o está duplicado el preload de Montserrat normal.`);\n  check(italicPreloadCount === 1, `${page}: falta o está duplicado el preload de Montserrat italic.`);";
          const newBlock = "  const preloadExpected = page !== 'perfil.html';\n  const expectedPreloadCount = preloadExpected ? 1 : 0;\n  check(stylesheetCount === 1, `${page}: debe cargar exactamente una vez css/montserrat.css con la versión ${VERSION}.`);\n  check(normalPreloadCount === expectedPreloadCount, `${page}: cantidad incorrecta de preload de Montserrat normal.`);\n  check(italicPreloadCount === expectedPreloadCount, `${page}: cantidad incorrecta de preload de Montserrat italic.`);";
          if (!source.includes(oldBlock)) throw new Error('No se encontró el bloque tipográfico esperado.');
          source = source.replace(oldBlock, newBlock);
          fs.writeFileSync(auditPath, source);
          fs.unlinkSync(workflowPath);
          NODE
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/audit-typography.js .github/workflows/apply-typography-profile-exception.yml
          git commit -m "Permite carga tipográfica sin preload en Perfil"
          git push origin HEAD:fix/profile-permissions-font-preloads
