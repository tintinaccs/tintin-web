name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  # Permite reintentar el deploy a mano desde la pestaña Actions sin
  # necesitar un commit vacío.
  workflow_dispatch:

# Sitio 100% estático (HTML/CSS/JS de mano, sin Jekyll). Antes de crear el
# artifact se regenera y verifica el inventario de diagnóstico contra los
# mismos archivos exactos que se publicarán.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita que dos deploys se pisen: si se dispara uno nuevo mientras otro está
# en curso, el nuevo espera en cola en vez de correr en paralelo.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerar y verificar inventario de diagnóstico
        run: npm run build:pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Sube exactamente el mismo árbol sobre el que se generó y verificó el
      # manifiesto. Así perfil.html y diagnostic-manifest.json pertenecen
      # siempre a una única versión atómica del despliegue.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
