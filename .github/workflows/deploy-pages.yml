name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  # Permite reintentar el deploy a mano desde la pestaña Actions sin
  # necesitar un commit vacío.
  workflow_dispatch:

# Sitio 100% estático (HTML/CSS/JS de mano, sin build ni Jekyll) — solo
# necesita leer el repo para subir el artifact.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita que dos deploys se pisen: si se dispara uno nuevo mientras otro está
# en curso, el nuevo espera en cola en vez de correr en paralelo.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Sube el repo completo tal cual — no hay Jekyll de por medio (a
      # diferencia del deploy clásico "desde una rama"), así que ningún
      # archivo/carpeta que empiece con "_" o "." se ignora ni se transforma.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
