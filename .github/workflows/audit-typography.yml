name: Audit typography

on:
  pull_request:
    paths:
      - "**/*.html"
      - "**/*.css"
      - "**/*.js"
      - "**/*.mjs"
      - "**/*.md"
      - "**/*.txt"
      - "assets-tintin/fonts/**"
      - "package.json"
      - ".github/workflows/audit-typography.yml"
  push:
    branches: ["main"]
    paths:
      - "**/*.html"
      - "**/*.css"
      - "**/*.js"
      - "**/*.mjs"
      - "**/*.md"
      - "**/*.txt"
      - "assets-tintin/fonts/**"
      - "package.json"
      - ".github/workflows/audit-typography.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typography:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax
        shell: bash
        run: |
          find . -type f \( -name "*.js" -o -name "*.mjs" \) \
            -not -path "./node_modules/*" \
            -not -path "./.git/*" \
            -print0 | xargs -0 -n1 node --check

      - name: Audit Montserrat-only typography
        run: node scripts/audit-typography.js
